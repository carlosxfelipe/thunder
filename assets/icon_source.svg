<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Bright nordic sky background (Thor / thunder) -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color:#7dbef0;stop-opacity:1"/>
      <stop offset="55%"  style="stop-color:#3b82f6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1"/>
    </linearGradient>

    <!-- Ambient electric glow behind hammer -->
    <radialGradient id="ambient-glow" cx="50%" cy="45%" r="55%">
      <stop offset="0%"   style="stop-color:#bae6fd;stop-opacity:0.55"/>
      <stop offset="60%"  style="stop-color:#7dd3fc;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#7dd3fc;stop-opacity:0"/>
    </radialGradient>

    <!-- Hammer head: brushed steel with cool highlight -->
    <linearGradient id="head-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color:#f4f7fb;stop-opacity:1"/>
      <stop offset="35%"  style="stop-color:#c5cdd8;stop-opacity:1"/>
      <stop offset="65%"  style="stop-color:#7d8a9c;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#3d4757;stop-opacity:1"/>
    </linearGradient>

    <!-- Hammer head front-face (slightly cooler, shows depth) -->
    <linearGradient id="head-face" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#9aa6b8;stop-opacity:1"/>
      <stop offset="50%"  style="stop-color:#cdd5e0;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#6b7686;stop-opacity:1"/>
    </linearGradient>

    <!-- Glossy specular streak across head (Tahoe glass) -->
    <linearGradient id="head-gloss" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  style="stop-color:#ffffff;stop-opacity:0.65"/>
      <stop offset="45%" style="stop-color:#ffffff;stop-opacity:0.05"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>

    <!-- Wooden handle gradient -->
    <linearGradient id="handle-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#6b3a1d;stop-opacity:1"/>
      <stop offset="40%"  style="stop-color:#a76a3a;stop-opacity:1"/>
      <stop offset="60%"  style="stop-color:#c98d56;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#5a2f17;stop-opacity:1"/>
    </linearGradient>

    <!-- Handle cap / wrap (leather strap accent) -->
    <linearGradient id="strap-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2a1810;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0e0703;stop-opacity:1"/>
    </linearGradient>

    <!-- Drop shadow filter -->
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="14" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.55"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft blur for lightning glow -->
    <filter id="bolt-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Background: Squircle -->
  <rect x="0" y="0" width="1024" height="1024" rx="225" ry="225" fill="url(#bg-grad)"/>

  <!-- Ambient electric glow -->
  <rect x="0" y="0" width="1024" height="1024" rx="225" ry="225" fill="url(#ambient-glow)"/>

  <!-- Mjölnir (hammer), bigger and centered -->
  <g transform="translate(512, 380) rotate(-18) scale(1.25)" filter="url(#soft-shadow)">

    <!-- ===== HANDLE ===== -->
    <!-- Handle main shaft -->
    <rect x="-32" y="-10" width="64" height="360" rx="14" fill="url(#handle-grad)"/>

    <!-- Handle subtle vertical highlight -->
    <rect x="-18" y="-10" width="10" height="360" rx="5" fill="rgba(255,255,255,0.18)"/>

    <!-- Leather strap wraps -->
    <rect x="-36" y="60"  width="72" height="22" rx="6" fill="url(#strap-grad)"/>
    <rect x="-36" y="60"  width="72" height="6"  rx="3" fill="rgba(255,255,255,0.15)"/>
    <rect x="-36" y="200" width="72" height="22" rx="6" fill="url(#strap-grad)"/>
    <rect x="-36" y="200" width="72" height="6"  rx="3" fill="rgba(255,255,255,0.15)"/>

    <!-- Handle pommel cap at bottom -->
    <rect x="-42" y="340" width="84" height="32" rx="10" fill="url(#strap-grad)"/>
    <rect x="-42" y="340" width="84" height="6"  rx="3" fill="rgba(255,255,255,0.18)"/>

    <!-- Leather loop at the very bottom -->
    <path d="M 0 372 q -22 28 0 56 q 22 -28 0 -56 Z"
          fill="none" stroke="#2a1810" stroke-width="6"/>

    <!-- ===== HAMMER HEAD (squat, Mjölnir-style) ===== -->
    <!-- Outer body (rounded rectangle) -->
    <g>
      <!-- Drop-shape head with subtle taper -->
      <path d="M -190 -150
               Q -210 -150 -210 -130
               L -210 -10
               Q -210 10 -190 14
               L 190 14
               Q 210 10 210 -10
               L 210 -130
               Q 210 -150 190 -150 Z"
            fill="url(#head-grad)"/>

      <!-- Front face (slightly inset rectangle for 3D) -->
      <rect x="-186" y="-130" width="372" height="120" rx="14" fill="url(#head-face)"/>

      <!-- Top specular streak (Tahoe glass) -->
      <path d="M -180 -148
               Q -200 -148 -200 -130
               L -200 -90
               L 200 -90
               L 200 -130
               Q 200 -148 180 -148 Z"
            fill="url(#head-gloss)"/>

      <!-- Side bevels for depth -->
      <rect x="-210" y="-150" width="22" height="164" fill="rgba(0,0,0,0.22)"/>
      <rect x="188"  y="-150" width="22" height="164" fill="rgba(0,0,0,0.18)"/>

      <!-- Engraved rune circle on face (nordic touch) -->
      <g opacity="0.55">
        <circle cx="0" cy="-70" r="32" fill="none" stroke="#1c2733" stroke-width="3"/>
        <!-- Simple rune: vertical with two diagonals (Þ-like / Thurisaz) -->
        <path d="M -2 -90 L -2 -50 M -2 -82 L 14 -74 L -2 -66"
              stroke="#1c2733" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </g>

      <!-- Decorative rivets on the corners -->
      <circle cx="-170" cy="-130" r="6" fill="#3d4757"/>
      <circle cx="-170" cy="-130" r="2.5" fill="#cdd5e0"/>
      <circle cx="170"  cy="-130" r="6" fill="#3d4757"/>
      <circle cx="170"  cy="-130" r="2.5" fill="#cdd5e0"/>
      <circle cx="-170" cy="-30"  r="6" fill="#3d4757"/>
      <circle cx="-170" cy="-30"  r="2.5" fill="#cdd5e0"/>
      <circle cx="170"  cy="-30"  r="6" fill="#3d4757"/>
      <circle cx="170"  cy="-30"  r="2.5" fill="#cdd5e0"/>

      <!-- Outline for crispness -->
      <path d="M -190 -150
               Q -210 -150 -210 -130
               L -210 -10
               Q -210 10 -190 14
               L 190 14
               Q 210 10 210 -10
               L 210 -130
               Q 210 -150 190 -150 Z"
            fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
    </g>
  </g>

  <!-- Subtle top sheen on the squircle (Tahoe glass) -->
  <path d="M 0 0 H 1024 V 320 Q 512 460 0 320 Z"
        fill="rgba(255,255,255,0.05)"/>
</svg>
